<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WardenGG Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif !important;
      background: #0e0e0e !important;
      color: #d4d4d4 !important;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #111 !important;
      border-right: 1px solid #1e1e1e !important;
    }

    .app-name {
      padding: 24px 20px 20px !important;
      border-bottom: 1px solid #1e1e1e !important;
    }

    .app-name-link {
      color: #00e87a !important;
      font-weight: 600 !important;
      font-size: 16px !important;
    }

    .sidebar-nav { padding: 12px 12px !important; }

    .sidebar-nav > ul > li > strong {
      display: block;
      font-size: 10.5px !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 1.3px !important;
      color: #444 !important;
      padding: 16px 8px 6px !important;
    }

    .sidebar-nav li a {
      color: #777 !important;
      font-size: 13.5px !important;
      padding: 5px 10px !important;
      border-radius: 6px !important;
      display: block !important;
      transition: all 0.15s !important;
      text-decoration: none !important;
    }

    .sidebar-nav li a:hover {
      color: #fff !important;
      background: #1a1a1a !important;
    }

    .sidebar-nav li.active > a {
      color: #00e87a !important;
      background: #0d1f17 !important;
    }

    /* ── Search ── */
    .search {
      border-bottom: 1px solid #1e1e1e !important;
      padding: 12px !important;
      margin-bottom: 4px !important;
    }

    .search input {
      background: #1a1a1a !important;
      border: 1px solid #252525 !important;
      border-radius: 8px !important;
      color: #ccc !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      width: 100% !important;
      padding: 8px 12px !important;
      outline: none !important;
    }

    .search input:focus { border-color: #00e87a !important; }

    /* ── Main content ── */
    .content { background: #0e0e0e !important; }

    .markdown-section {
      max-width: 820px !important;
      padding: 48px 56px !important;
      color: #d4d4d4 !important;
    }

    /* ── Typography ── */
    h1 {
      color: #fff !important;
      font-size: 30px !important;
      font-weight: 600 !important;
      border-bottom: 1px solid #1e1e1e !important;
      padding-bottom: 16px !important;
      margin-bottom: 24px !important;
    }

    h2 {
      color: #fff !important;
      font-size: 19px !important;
      font-weight: 600 !important;
      margin-top: 44px !important;
      margin-bottom: 12px !important;
      padding-bottom: 8px !important;
      border-bottom: 1px solid #1a1a1a !important;
    }

    h3 {
      color: #bbb !important;
      font-size: 14.5px !important;
      font-weight: 500 !important;
      margin-top: 24px !important;
      margin-bottom: 8px !important;
    }

    p { color: #c8c8c8 !important; line-height: 1.8 !important; }

    strong { color: #fff !important; }

    a { color: #00e87a !important; text-decoration: none !important; }
    a:hover { color: #33ff99 !important; text-decoration: underline !important; }

    /* ── Code ── */
    code {
      font-family: 'JetBrains Mono', monospace !important;
      background: #1a1a1a !important;
      color: #00e87a !important;
      font-size: 12.5px !important;
      padding: 2px 7px !important;
      border-radius: 5px !important;
      border: 1px solid #252525 !important;
    }

    pre {
      background: #141414 !important;
      border: 1px solid #222 !important;
      border-radius: 10px !important;
      padding: 20px !important;
    }

    pre code {
      color: #ccc !important;
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      font-size: 13px !important;
    }

    /* ── Blockquote (tips/warnings) ── */
    blockquote {
      border-left: 3px solid #00e87a !important;
      background: #0a1a10 !important;
      border-radius: 0 8px 8px 0 !important;
      padding: 14px 18px !important;
      margin: 20px 0 !important;
    }

    blockquote p { color: #999 !important; margin: 0 !important; font-size: 13.5px !important; }

    /* ── HR ── */
    hr {
      border: none !important;
      border-top: 1px solid #1e1e1e !important;
      margin: 36px 0 !important;
    }

    /* ── Lists ── */
    ul li, ol li { color: #c8c8c8 !important; line-height: 1.8 !important; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'WardenGG',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results found.',
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
