<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WardenGG Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-dark-theme@1.1.0/dist/style.min.css">
  <style>
    body { font-family: 'Inter', sans-serif !important; background: #0e0e0e !important; }

    .sidebar {
      background: #141414 !important;
      border-right: 1px solid #1e1e1e !important;
    }

    .app-name-link { color: #00e87a !important; font-weight: 600 !important; font-size: 17px !important; }

    .sidebar-nav a { color: #888 !important; font-size: 13.5px !important; border-radius: 6px; padding: 4px 10px !important; display: block; transition: all 0.15s; }
    .sidebar-nav a:hover { color: #fff !important; background: #1e1e1e; text-decoration: none !important; }
    .sidebar-nav .active { color: #00e87a !important; }
    .sidebar-nav strong { color: #444 !important; font-size: 11px !important; text-transform: uppercase; letter-spacing: 1.2px; }

    .search input {
      background: #1a1a1a !important;
      border: 1px solid #2a2a2a !important;
      border-radius: 8px !important;
      color: #ccc !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
    }

    .content { background: #0e0e0e !important; color: #d4d4d4 !important; }
    .markdown-section { max-width: 820px; padding: 40px 48px !important; }

    h1 { color: #fff !important; font-size: 28px !important; font-weight: 600 !important; border-bottom: 1px solid #1e1e1e !important; padding-bottom: 16px !important; }
    h2 { color: #fff !important; font-size: 20px !important; font-weight: 600 !important; margin-top: 40px !important; }
    h3 { color: #ccc !important; font-size: 15px !important; font-weight: 500 !important; }

    a { color: #00e87a !important; }
    a:hover { color: #33ff99 !important; }

    code {
      font-family: 'JetBrains Mono', monospace !important;
      background: #1e1e1e !important;
      color: #00e87a !important;
      font-size: 13px !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
    }

    pre {
      background: #161616 !important;
      border: 1px solid #222 !important;
      border-radius: 10px !important;
    }

    pre code { color: #d4d4d4 !important; background: transparent !important; padding: 0 !important; }

    blockquote {
      border-left: 3px solid #00e87a !important;
      background: #0d1a12 !important;
      border-radius: 0 8px 8px 0 !important;
      padding: 12px 16px !important;
      color: #aaa !important;
      margin: 16px 0 !important;
    }

    hr { border-color: #1e1e1e !important; margin: 32px 0 !important; }
    strong { color: #fff !important; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'WardenGG',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      search: { placeholder: 'Search docs...', noData: 'No results.' },
      alias: { '/.*/_sidebar.md': '/_sidebar.md' }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
