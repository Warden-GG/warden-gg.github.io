<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WardenGG Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    /*
     * WardenGG Docs - shadcn/zinc inspired
     * Neutral greys + blue accent, no glow, no gradients
     */

    *, *::before, *::after { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif !important;
      background: #09090b !important;
      color: #fafafa !important;
      margin: 0 !important;
      -webkit-font-smoothing: antialiased;
    }

    /* Kill white background leaks from vue theme */
    .app-nav, .content, .sidebar, main, article,
    .markdown-section, nav.app-nav {
      background-color: #09090b !important;
    }

    ::selection {
      background: rgba(59, 130, 246, 0.25);
      color: #fff;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: #09090b !important;
      border-right: 1px solid #1c1c1f !important;
      overflow-y: auto !important;
    }

    .app-name {
      padding: 20px 20px 12px !important;
      margin: 0 !important;
      border: none !important;
    }

    .app-name-link {
      color: #fafafa !important;
      font-weight: 700 !important;
      font-size: 15px !important;
      letter-spacing: -0.3px !important;
      text-decoration: none !important;
    }

    /* Language switch */
    .lang-switch {
      display: flex;
      gap: 4px;
      padding: 0 16px 12px;
      border-bottom: 1px solid #1c1c1f;
    }

    .lang-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 5px 0;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #52525b;
      background: transparent;
      border: 1px solid #27272a;
      border-radius: 5px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      text-decoration: none !important;
      user-select: none;
    }

    .lang-btn:hover {
      color: #a1a1aa;
      border-color: #3f3f46;
      background: #18181b !important;
      text-decoration: none !important;
    }

    .lang-btn.active {
      color: #3b82f6;
      border-color: #1d4ed8;
      background: rgba(59, 130, 246, 0.06) !important;
    }

    /* ── Search ── */
    .search {
      padding: 12px 16px !important;
      margin: 0 !important;
      border-bottom: 1px solid #1c1c1f !important;
    }

    .search input {
      background: #18181b !important;
      border: 1px solid #27272a !important;
      border-radius: 6px !important;
      color: #a1a1aa !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 13px !important;
      width: 100% !important;
      padding: 7px 10px !important;
      outline: none !important;
      transition: border-color 0.15s !important;
    }

    .search input:focus {
      border-color: #3b82f6 !important;
      box-shadow: none !important;
    }

    .search input::placeholder { color: #3f3f46 !important; }

    .search .matching-post { border-bottom: 1px solid #1c1c1f !important; }
    .search .matching-post h2 a { color: #3b82f6 !important; }
    .search .clear-button { color: #52525b !important; }
    .search h2 { color: #a1a1aa !important; border: none !important; margin: 0 !important; padding: 0 !important; }
    .search a { color: #3b82f6 !important; }
    .search p { color: #71717a !important; }

    /* ── Sidebar nav ── */
    .sidebar-nav { padding: 8px 12px !important; }

    .sidebar-nav ul { padding: 0 !important; margin: 0 !important; }

    .sidebar-nav > ul > li > strong,
    .sidebar-nav > ul > li > p > strong {
      display: block !important;
      font-size: 10px !important;
      font-weight: 600 !important;
      text-transform: uppercase !important;
      letter-spacing: 1.2px !important;
      color: #52525b !important;
      padding: 16px 8px 4px !important;
      background: transparent !important;
    }

    .sidebar-nav li { list-style: none !important; }

    .sidebar-nav li a {
      color: #71717a !important;
      font-size: 13px !important;
      font-weight: 400 !important;
      padding: 4px 8px !important;
      border-radius: 4px !important;
      display: block !important;
      transition: color 0.12s, background 0.12s !important;
      text-decoration: none !important;
      line-height: 1.6 !important;
    }

    .sidebar-nav li a:hover {
      color: #d4d4d8 !important;
      background: #18181b !important;
      text-decoration: none !important;
    }

    .sidebar-nav li.active > a {
      color: #3b82f6 !important;
      background: rgba(59, 130, 246, 0.06) !important;
    }

    /* Sidebar toggle (bottom-left hamburger) */
    .sidebar-toggle {
      background: #09090b !important;
      border-top: 1px solid #1c1c1f !important;
      padding: 8px !important;
      width: auto !important;
      bottom: 0 !important;
    }

    .sidebar-toggle span {
      background-color: #52525b !important;
    }

    .sidebar-toggle:hover span {
      background-color: #a1a1aa !important;
    }

    /* ── Main content ── */
    .content {
      background: #09090b !important;
    }

    .markdown-section {
      max-width: 780px !important;
      padding: 40px 48px !important;
      color: #d4d4d8 !important;
    }

    /* ── Typography ── */
    h1 {
      color: #fafafa !important;
      font-size: 26px !important;
      font-weight: 600 !important;
      letter-spacing: -0.4px !important;
      border-bottom: 1px solid #1c1c1f !important;
      padding-bottom: 12px !important;
      margin: 0 0 24px 0 !important;
    }

    h2 {
      color: #fafafa !important;
      font-size: 17px !important;
      font-weight: 600 !important;
      margin-top: 40px !important;
      margin-bottom: 12px !important;
      padding-bottom: 8px !important;
      border-bottom: 1px solid #18181b !important;
      letter-spacing: -0.2px !important;
    }

    h3 {
      color: #a1a1aa !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      margin-top: 24px !important;
      margin-bottom: 8px !important;
    }

    p {
      color: #a1a1aa !important;
      line-height: 1.7 !important;
      font-size: 14px !important;
      margin: 8px 0 !important;
    }

    strong { color: #e4e4e7 !important; }

    a {
      color: #3b82f6 !important;
      text-decoration: none !important;
      transition: color 0.12s !important;
    }

    a:hover {
      color: #60a5fa !important;
      text-decoration: underline !important;
    }

    /* ── Code ── */
    code {
      font-family: 'JetBrains Mono', monospace !important;
      background: #18181b !important;
      color: #e4e4e7 !important;
      font-size: 12px !important;
      padding: 2px 6px !important;
      border-radius: 4px !important;
      border: 1px solid #27272a !important;
    }

    pre {
      background: #0f0f11 !important;
      border: 1px solid #1c1c1f !important;
      border-radius: 6px !important;
      padding: 16px !important;
      margin: 12px 0 !important;
    }

    pre code {
      color: #a1a1aa !important;
      background: transparent !important;
      border: none !important;
      padding: 0 !important;
      font-size: 12.5px !important;
      line-height: 1.65 !important;
    }

    /* Copy code button */
    .docsify-copy-code-button {
      font-size: 11px !important;
      font-family: 'Inter', sans-serif !important;
      padding: 2px 6px !important;
      background: #18181b !important;
      color: #52525b !important;
      border: 1px solid #27272a !important;
      border-radius: 3px !important;
    }

    .docsify-copy-code-button:hover {
      color: #a1a1aa !important;
      border-color: #3f3f46 !important;
    }

    /* ── Blockquotes ── */
    blockquote {
      border-left: 2px solid #27272a !important;
      background: #0f0f11 !important;
      border-radius: 0 4px 4px 0 !important;
      padding: 12px 16px !important;
      margin: 16px 0 !important;
    }

    blockquote p {
      color: #71717a !important;
      margin: 0 !important;
      font-size: 13px !important;
    }

    blockquote.bq-warning {
      border-left-color: #92400e !important;
      background: rgba(120, 53, 15, 0.08) !important;
    }

    blockquote.bq-warning p { color: #a1a1aa !important; }

    blockquote.bq-info {
      border-left-color: #1e40af !important;
      background: rgba(30, 64, 175, 0.06) !important;
    }

    blockquote.bq-info p { color: #a1a1aa !important; }

    /* ── HR ── */
    hr {
      border: none !important;
      height: 1px !important;
      background: #1c1c1f !important;
      margin: 32px 0 !important;
    }

    /* ── Lists ── */
    ul, ol { padding-left: 20px !important; }

    ul li, ol li {
      color: #a1a1aa !important;
      line-height: 1.7 !important;
      font-size: 14px !important;
    }

    li + li { margin-top: 2px !important; }

    /* ── Tables ── */
    .markdown-section table {
      border-collapse: collapse !important;
      width: auto !important;
      margin: 12px 0 !important;
      border: 1px solid #27272a !important;
      border-radius: 6px !important;
      overflow: hidden !important;
    }

    .markdown-section thead { background: #18181b !important; }

    .markdown-section th {
      background: #18181b !important;
      color: #a1a1aa !important;
      font-size: 12px !important;
      font-weight: 600 !important;
      padding: 8px 16px !important;
      border: none !important;
      border-bottom: 1px solid #27272a !important;
      text-align: left !important;
    }

    .markdown-section td {
      background: #09090b !important;
      color: #a1a1aa !important;
      font-size: 13px !important;
      padding: 8px 16px !important;
      border: none !important;
      border-bottom: 1px solid #1c1c1f !important;
    }

    .markdown-section tr:last-child td {
      border-bottom: none !important;
    }

    .markdown-section tr:nth-child(2n) td {
      background: #0f0f11 !important;
    }

    .markdown-section tr:hover td {
      background: #18181b !important;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 20px 16px !important;
      }

      h1 { font-size: 22px !important; }
      h2 { font-size: 16px !important; }

      .sidebar-toggle {
        background: transparent !important;
        border: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    function wggPlugin(hook, vm) {
      var initialized = false;

      hook.doneEach(function() {
        // Classify blockquotes
        document.querySelectorAll('.markdown-section blockquote').forEach(function(bq) {
          bq.classList.remove('bq-warning', 'bq-info');
          var text = bq.textContent || '';
          if (text.indexOf('\u26a0') !== -1) bq.classList.add('bq-warning');
          else if (text.indexOf('\u2139') !== -1) bq.classList.add('bq-info');
        });

        updateLangState();

        if (initialized) return;
        initialized = true;

        var appName = document.querySelector('.app-name');
        if (!appName) return;

        var sw = document.createElement('div');
        sw.className = 'lang-switch';
        sw.innerHTML =
          '<a class="lang-btn" data-lang="en">\ud83c\uddec\ud83c\udde7 EN</a>' +
          '<a class="lang-btn" data-lang="zh">\ud83c\udde8\ud83c\uddf3 CN</a>';
        appName.after(sw);

        sw.addEventListener('click', function(e) {
          var btn = e.target.closest('.lang-btn');
          if (!btn) return;
          var hash = location.hash || '#/';
          var isZh = hash.indexOf('#/zh') === 0;
          var page = isZh
            ? hash.replace(/^#\/zh\/?/, '')
            : hash.replace(/^#\//, '');
          if (btn.dataset.lang === 'zh' && !isZh) {
            location.hash = '#/zh/' + page;
          } else if (btn.dataset.lang === 'en' && isZh) {
            location.hash = '#/' + page;
          }
        });

        updateLangState();
      });

      function updateLangState() {
        var hash = location.hash || '#/';
        var isZh = hash.indexOf('#/zh') === 0;
        document.querySelectorAll('.lang-btn').forEach(function(b) {
          b.classList.toggle('active', (b.dataset.lang === 'zh') === isZh);
        });
        var link = document.querySelector('.app-name-link');
        if (link) link.href = isZh ? '#/zh/' : '#/';
      }
    }

    window.$docsify = {
      name: 'WardenGG',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      search: {
        placeholder: 'Search...',
        noData: 'No results.',
        paths: 'auto'
      },
      plugins: [wggPlugin]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>
</html>
